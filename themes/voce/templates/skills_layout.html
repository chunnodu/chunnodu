{% extends "base.html" %}

{% block content %}
<style>
    @font-face {
        font-family: 'iA Writer Quattro S';
        src: url('{{ SITEURL }}/theme/fonts/iAWriterQuattroS-Regular.woff2') format('woff2'),
        url('{{ SITEURL }}/theme/fonts/iAWriterQuattroS-Regular.woff') format('woff');
        font-weight: 400;
        font-style: normal;
        font-display: swap;
    }

    @font-face {
        font-family: 'iA Writer Quattro S';
        src: url('{{ SITEURL }}/theme/fonts/iAWriterQuattroS-Bold.woff2') format('woff2'),
        url('{{ SITEURL }}/theme/fonts/iAWriterQuattroS-Bold.woff') format('woff');
        font-weight: 700;
        font-style: normal;
        font-display: swap;
    }

    .plum-page {
        font-family: 'iA Writer Quattro S', 'Helvetica Neue', Helvetica, Arial, sans-serif;
        color: #058c8c;
        /* ink */
        max-width: 800px;
        margin: 0 auto;
        padding: 40px 20px;
    }

    .plum-page h1 {
        font-size: 3.5rem;
        color: #023b3b;
        /* ink darkest */
        margin-bottom: 2rem;
        font-weight: 700;
        line-height: 1.2;
    }

    .plum-page h2 {
        color: #a1665e;
        /* terra cotta */
        font-size: 2.5rem;
        margin-top: 3rem;
        margin-bottom: 1rem;
        border-bottom: 1px solid #b2dbdb;
        padding-bottom: 10px;
        font-weight: 700;
        line-height: 1.2;
    }

    .plum-page h3 {
        color: #046363;
        /* ink dark */
        font-size: 1.8rem;
        margin-top: 1.5rem;
        margin-bottom: 1rem;
        font-weight: 700;
    }

    .plum-page p,
    .plum-page ul {
        font-size: 1.4rem;
        line-height: 1.6;
        color: #046363;
        /* ink dark */
    }

    .plum-page ul {
        padding-left: 20px;
        margin-bottom: 1.5rem;
    }

    .plum-page li {
        margin-bottom: 0.5rem;
    }

    .plum-page .plum-btn {
        display: inline-block;
        margin-top: 2rem;
        padding: 1rem 2rem;
        border: 2px solid #a1665e;
        background: transparent;
        text-decoration: none;
        color: #a1665e;
        font-weight: 700;
        text-transform: uppercase;
        font-size: 0.9rem;
        letter-spacing: 0.05em;
        transition: all 0.3s;
        border-radius: 2px;
        text-align: center;
    }

    .plum-page .plum-btn:hover {
        background: #a1665e;
        color: #ffffff;
    }
</style>

<article>
    <div class="blog-item-wrap">
        <div class="post-inner-content">
            <div class="entry-content plum-page">
                {{ page.content }}
            </div>
        </div>
    </div>
</article>
{% endblock %}
